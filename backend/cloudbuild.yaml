# ============================================================
# SPARK Backend — Cloud Build Configuration
# Builds and deploys to Cloud Run
# ============================================================

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/spark-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/spark-backend:latest'
      - '.'
    dir: 'backend'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/spark-backend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/spark-backend:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'spark-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/spark-backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'APP_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=us-central1,VERTEX_AI_MODEL=gemini-2.5-flash'

images:
  - 'gcr.io/$PROJECT_ID/spark-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/spark-backend:latest'

timeout: '600s'